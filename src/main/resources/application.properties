# ==========================================
# Configuracion de la aplicacion
# WAS 9 - Spring Framework - JDK 8
# ==========================================

# Aplicacion
app.name=WAS9SpringApp
app.version=1.0.0

# JPA - WAS 9 usa IBM OpenJPA como proveedor por defecto.
# No se configura dialecto de Hibernate (no incluido).
# La unidad de persistencia 'appPU' se define en applicationContext.xml.

# Logging
logging.level.com.empresa=INFO
logging.level.org.springframework=WARN
